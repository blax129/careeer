[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_SITE_URL = "https://fifa26recruitment.com"
  # EmailJS service/template IDs are hardcoded in js/site-config.js (Zoho + template_jwpyyg2).

# Ensure job data is served with correct type (apply form depends on this file).
[[headers]]
  for = "/postings.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"
